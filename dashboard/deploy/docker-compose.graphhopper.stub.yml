version: '3.9'

services:
  graphhopper:
    image: ghcr.io/graphhopper/graphhopper:latest
    container_name: graphhopper
    restart: unless-stopped
    ports:
      - "127.0.0.1:8989:8989"
    volumes:
      - ./graphhopper/config.yml:/config/config.yml:ro
      - ./graphhopper/data:/data
    command: ["server", "/config/config.yml"]


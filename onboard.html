<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="theme-color" content="#ECEAE2" />
    <title>CoachMate Onboard Display</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="onboard.css" />
  </head>
  <body>

    <!--
      Fixed passenger-facing sign — vehicle-mounted landscape tablet (Fire HD
      10, ~1920x1200), no touch interaction expected. Deliberately silo'd
      from the driver PWA (index.html/main.js): no login, no duty card, no
      incident reporting, no stop-time upload — reads schedule_view only.

      No manual intervention: this device is configured (via ?journey=<id>
      in the URL, or a Pi-side equivalent) to watch one specific journey.
      It sits on a blank grey screen until that journey's status flips to
      in_progress (i.e. the driver hits Start on their own phone), then
      wakes on its own — see src/onboard.js's poll loop.

      Styled as an e-paper sign (onboard.css): mostly monochrome and
      motion-free, hard corners — not just a different colour scheme from
      the driver PWA. Two deliberate exceptions: the brand mark keeps its
      real colours, and the tube-track dot pulses green on a confirmed
      stop arrival. See onboard.css for why.
    -->

    <div id="onboard-brand">
      <div class="bh-wordmark">BUSHUB<span class="bh-app">.NextStop</span></div>
      <div class="cm-attribution">
        <span class="cm-powered-by">Powered by</span>
        <span class="cm-wordmark"><span class="cm-coach">COACH</span><span class="cm-mate">Mate</span></span>
      </div>
    </div>

    <div id="onboard-sign" hidden>
      <div id="sign-topbar">
        <span id="sign-service-code"></span>
        <span id="sign-destination"></span>
      </div>

      <div id="early-wait-banner" hidden>
        <div class="ewb-title">WAIT HERE</div>
        <div class="ewb-msg">Running early — depart at <span id="ewb-time"></span></div>
      </div>

      <div id="sign-hero">
        <div class="sign-hero-row">
          <span class="sign-hero-label">This stop is</span>
          <span id="sign-current-stop" class="sign-hero-value">&mdash;</span>
        </div>
        <div class="sign-hero-row">
          <span class="sign-hero-label">The next stop will be</span>
          <span id="sign-next-stop" class="sign-hero-value">&mdash;</span>
        </div>
      </div>

      <div id="tube-track"></div>
    </div>

    <script type="module" src="src/onboard.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js').catch(console.error);
        });
      }
    </script>
  </body>
</html>

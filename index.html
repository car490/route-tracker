<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="theme-color" content="#1e3d72" />
    <title>Route Timing Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="manifest" href="manifest.json" />
    <link rel="stylesheet" href="lib/leaflet.min.css" />
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>

    <!-- Duty card screen (shown when ?duties= param present) -->
    <div id="duty-card" hidden>
      <div class="dc-header">
        <div class="picker-brand">Phil Haines Coaches</div>
        <div class="dc-greeting">
          <span id="dc-greeting-prefix">Good morning,</span>
          <span id="dc-driver-name"></span>
        </div>
        <div id="dc-date" class="dc-date"></div>
      </div>
      <div id="dc-routes"></div>
    </div>

    <!-- Picker screen -->
    <div id="picker" hidden>
      <div class="picker-title">
        <div class="picker-brand">Phil Haines Coaches</div>
        <div class="picker-subtitle">Route Timing Tracker</div>
      </div>
      <button id="picker-back-btn" hidden>&#8592; Back to Duty Card</button>
      <div class="picker-field" id="picker-service-field">
        <label for="service-select">Service</label>
        <div class="select-wrap">
          <select id="service-select"></select>
        </div>
      </div>
      <div class="picker-field" id="picker-run-field">
        <label for="run-select">Run</label>
        <div class="select-wrap">
          <select id="run-select"></select>
        </div>
      </div>
      <div class="picker-field">
        <label for="stop-select">Starting stop</label>
        <div class="select-wrap">
          <select id="stop-select"></select>
        </div>
      </div>
      <button id="start-btn">Start</button>
    </div>

    <div id="wakelock-warning" hidden>
      Screen lock active — keep screen on manually or tracking will stop
    </div>

    <div id="tracker" hidden>
    <div id="early-wait-banner" hidden>
      <div class="ewb-title">WAIT HERE</div>
      <div class="ewb-msg">Running early — depart at <span id="ewb-time"></span></div>
    </div>
    <div id="route-header">
      <span id="header-service"></span>
      <div id="route-lines">
        <span id="header-line1"></span>
        <span id="header-line2"></span>
        <span id="header-line3"></span>
      </div>
    </div>
    <div id="status-card">
      <div id="status-label">INITIALISING</div>
      <div id="next-stop">—</div>

      <div class="time-row">
        <div class="time-group">
          <span class="time-label">Scheduled</span>
          <span class="time-value" id="sched-time">--:--</span>
        </div>
        <div class="time-group">
          <span class="time-label">ETA</span>
          <span class="time-value" id="eta-time">--:--</span>
        </div>
        <span id="delta">—</span>
      </div>

      <div class="metrics-row">
        <div class="metric">
          <span class="metric-label">Distance</span>
          <span class="metric-value" id="distance">—</span>
        </div>
        <div class="metric">
          <span class="metric-label">Speed</span>
          <span class="metric-value" id="speed">—</span>
        </div>
      </div>
    </div>

    <div class="progress-section">
      <div class="stop-labels">
        <span class="stop-label-prefix">Next Stop :</span>
        <span id="next-stop-label">—</span>
      </div>
      <div class="progress-track">
        <div id="progress-fill"></div>
      </div>
    </div>

    <div class="view-toggle">
      <button id="btn-list" class="toggle-btn toggle-active">List</button>
      <button id="btn-map"  class="toggle-btn">Map</button>
      <button id="btn-dir"  class="toggle-btn">Directions</button>
      <button id="btn-log"  class="toggle-btn">Log</button>
    </div>
    <div id="stop-list"></div>
    <div id="map-view" hidden></div>
    <div id="directions-view" hidden></div>
    <div id="log-view" hidden></div>
    <button id="btn-complete" style="width:100%;margin-top:12px;padding:14px;background:#c0392b;color:#fff;font-family:Oswald,sans-serif;font-size:1rem;font-weight:600;letter-spacing:0.05em;border:none;border-radius:6px;cursor:pointer;">Complete Trip</button>
    </div>

    <p style="text-align:center;font-size:0.7rem;color:var(--text-muted);opacity:0.6;padding:16px 0 8px;margin:0;">v2.0 · build 12</p>

    <script src="lib/leaflet.min.js"></script>
    <script type="module" src="src/main.js"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('service-worker.js').catch(console.error);
        });
      }
    </script>
  </body>
</html>
